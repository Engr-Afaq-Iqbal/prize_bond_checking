name: prize_bond_app
description: "A new Flutter project."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev
version: 1.0.0+1

environment:
  sdk: ^3.6.1


dependencies:
  flutter:
    sdk: flutter
  # UI & Utilities
  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.0.10+1

  # State Management & Local Storage
  get: ^4.7.2
  get_storage: ^2.1.1

  # Firebase Core Services
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.7        # Firebase Storage for PDF uploads (Blaze plan)
  firebase_messaging: ^15.1.3      # Push notifications

  # Local Database (offline support)
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # PDF & File Handling
  file_picker: ^8.1.2              # Admin picks PDF to upload
  path_provider: ^2.1.4            # Get device file paths
  open_filex: ^4.5.0               # Open downloaded/generated PDFs
  pdf: ^3.11.1                     # Generate PDFs from draw results locally
  printing: ^5.13.1                # Share / save generated PDFs

  # Connectivity
  connectivity_plus: ^6.1.1        # Detect online/offline

  # Local notifications (draw results + winner alerts in all app states)
  flutter_local_notifications: ^18.0.1

  # Logging
  logger: ^2.6.1

  # Permission handling
  permission_handler: ^11.3.1

  # QR Code scanner (replaces camera + mlkit OCR — much simpler and more reliable)
  mobile_scanner: ^5.2.3

  # URL launcher (WhatsApp contact in marketplace)
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter


  flutter_lints: ^5.0.0


flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Light.ttf
          weight: 300
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Thin.ttf
          weight: 100
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-Black.ttf
          weight: 800
        - asset: assets/fonts/Poppins-ExtraBold.ttf
          weight: 900


